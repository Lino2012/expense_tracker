name: expensio
description: A beautiful expense tracker app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'  # Add this line - use your Dart SDK version

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # UI
  fl_chart: ^0.66.0
  intl: ^0.19.0
  animations: ^2.0.11
  
  # Database
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2
  
  # Image Picker
  image_picker: ^1.0.5
  image_picker_windows: ^0.2.1  # For Windows support
  
  # Utilities
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icon/
    - assets/images/  # For default avatar